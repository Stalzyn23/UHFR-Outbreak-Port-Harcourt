services:
  - type: web
    name: uhfr-outbreak-port-harcourt
    env: node
    plan: free
    buildCommand: ""
    startCommand: node server.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: uhfr-room-state
      mountPath: /var/data
      sizeGB: 1
